version: 2

multi-ecosystem-groups:
  infrastructure:
    schedule:
      interval: "weekly"
      day: "wednesday"
    open-pull-requests-limit: 25
    commit-message:
      prefix: "chore"
      include: "scope"

updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
    open-pull-requests-limit: 25
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      dotnet-minor-patch:
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"
      dotnet-major:
        update-types:
          - "major"
        patterns:
          - "*"
    # These are pinned as version ranges inside a TargetFramework-conditional
    # ItemGroup in Directory.Packages.props (parallel net10.0-stable/
    # net11.0-preview lines - see the comment there). Dependabot can't
    # reliably resolve/update a conditional range, so it's ignored here and
    # bumped by hand instead.
    ignore:
      - dependency-name: "Microsoft.EntityFrameworkCore.Relational"
      - dependency-name: "Microsoft.EntityFrameworkCore.Sqlite"
      - dependency-name: "Microsoft.Extensions.Identity.Core"
      - dependency-name: "Microsoft.Extensions.DependencyInjection"
      - dependency-name: "Microsoft.Extensions.Hosting"
      - dependency-name: "Microsoft.Extensions.Configuration"
      - dependency-name: "EntityFrameworkCore.DynamoDb"

  - package-ecosystem: "dotnet-sdk"
    directory: "/"
    patterns:
      - "*"
    multi-ecosystem-group: "infrastructure"
    cooldown:
      default-days: 7

  - package-ecosystem: "github-actions"
    directory: "/"
    patterns:
      - "*"
    multi-ecosystem-group: "infrastructure"
    cooldown:
      default-days: 7

  - package-ecosystem: "uv"
    directory: "/docsite"
    patterns:
      - "*"
    multi-ecosystem-group: "infrastructure"
    cooldown:
      default-days: 7
