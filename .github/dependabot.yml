version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
    open-pull-requests-limit: 25
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      dotnet-minor-patch:
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"
      dotnet-major:
        update-types:
          - "major"
        patterns:
          - "*"
