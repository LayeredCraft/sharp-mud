[project]
site_name = "sharp-mud"
site_description = "A modern C#/.NET engine for building MUDs (Multi-User Dungeons)."
site_author = "LayeredCraft"
site_url = "https://sharp-mud.layeredcraft.dev/"
repo_url = "https://github.com/LayeredCraft/sharp-mud"
repo_name = "LayeredCraft/sharp-mud"
edit_uri = "edit/main/docsite/docs/"
copyright = "Copyright &copy; 2026 LayeredCraft"
docs_dir = "docs"

nav = [
  { "Home" = "index.md" },
  { "Getting Started" = "getting-started.md" },
  { "Rulesets" = "rulesets.md" },
  { "Customizing sharp-mud" = "customizing.md" },
  { "Moderation & World Building" = "moderation-and-world-building.md" }
]

[project.markdown_extensions.attr_list]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"
[project.markdown_extensions.admonition]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.snippets]
[project.markdown_extensions.toc]
permalink = true
permalink_title = "Anchor link to this section"

[project.theme]
logo = "images/icon.png"
favicon = "images/icon.png"
features = [
  "navigation.footer",
  "navigation.indexes",
  "content.action.edit",
  "content.action.view",
  "content.code.copy",
  "content.code.select"
]

[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to system preference"

[project.extra]
homepage = "https://github.com/LayeredCraft/sharp-mud"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/LayeredCraft/sharp-mud"
name = "LayeredCraft on GitHub"
